<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Религиоведение</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #080c14;
    --surface:   #0f1623;
    --card:      #141c2e;
    --border:    #1e2d47;
    --accent:    #00d4ff;
    --accent2:   #7c3aed;
    --success:   #10b981;
    --danger:    #ef4444;
    --warning:   #f59e0b;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --radius:    14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Sora', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── MESH BACKGROUND ── */
  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(0,212,255,.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 90%, rgba(124,58,237,.07) 0%, transparent 60%);
    pointer-events: none;
  }

  #app { position: relative; z-index: 1; }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    animation: fadeIn .5s ease;
  }

  .logo {
    font-size: 3rem; margin-bottom: .5rem;
    filter: drop-shadow(0 0 20px rgba(0,212,255,.4));
  }

  h1 {
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent), #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-align: center; margin-bottom: .5rem;
  }

  .subtitle {
    color: var(--muted); font-size: .95rem; text-align: center;
    margin-bottom: 3rem;
  }

  .setup-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%; max-width: 480px;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }

  .field-label {
    font-size: .8rem; font-weight: 600; letter-spacing: .1em;
    text-transform: uppercase; color: var(--muted);
    margin-bottom: .75rem;
  }

  .pill-group {
    display: flex; flex-wrap: wrap; gap: .5rem; margin-bottom: 2rem;
  }

  .pill {
    padding: .45rem 1rem; border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface); color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: .85rem; cursor: pointer;
    transition: all .2s;
  }

  .pill:hover { border-color: var(--accent); color: var(--accent); }
  .pill.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }

  .custom-row {
    display: flex; gap: .75rem; align-items: center; margin-bottom: 2rem;
  }

  .custom-row input {
    flex: 1; padding: .65rem 1rem;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'Sora', sans-serif; font-size: .95rem;
    outline: none; transition: border-color .2s;
  }

  .custom-row input:focus { border-color: var(--accent); }

  .custom-row input::placeholder { color: var(--muted); }

  .btn-primary {
    width: 100%; padding: .9rem;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    border: none; border-radius: var(--radius);
    color: #000; font-family: 'Sora', sans-serif;
    font-size: 1rem; font-weight: 700;
    cursor: pointer; letter-spacing: .03em;
    transition: all .25s; position: relative; overflow: hidden;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,212,255,.35);
  }

  .btn-primary:active { transform: translateY(0); }

  .total-badge {
    text-align: center; margin-top: 1.25rem;
    color: var(--muted); font-size: .85rem;
  }

  .total-badge span {
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace; font-weight: 600;
  }

  /* ── QUIZ SCREEN ── */
  #quiz-screen {
    display: none; flex-direction: column;
    min-height: 100vh; padding: 0;
    animation: fadeIn .4s ease;
  }

  /* Header bar */
  .quiz-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(8,12,20,.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: .9rem 1.5rem;
    display: flex; align-items: center; gap: 1rem;
  }

  .prog-wrap { flex: 1; }

  .prog-meta {
    display: flex; justify-content: space-between;
    font-size: .78rem; color: var(--muted); margin-bottom: .4rem;
  }

  .prog-bar {
    height: 4px; background: var(--surface);
    border-radius: 999px; overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #a78bfa);
    border-radius: 999px;
    transition: width .4s cubic-bezier(.4,0,.2,1);
  }

  .timer-display {
    display: flex; align-items: center; gap: .4rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 1rem; font-weight: 500;
    color: var(--text); white-space: nowrap;
  }

  .timer-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--success);
    animation: pulse 1s infinite;
  }

  .timer-dot.warning { background: var(--warning); }
  .timer-dot.danger  { background: var(--danger); }

  @keyframes pulse {
    0%,100% { opacity:1; transform: scale(1); }
    50%      { opacity:.5; transform: scale(.85); }
  }

  .btn-finish-early {
    padding: .45rem .9rem; border-radius: 999px;
    background: transparent; border: 1px solid var(--danger);
    color: var(--danger); font-family: 'Sora', sans-serif;
    font-size: .78rem; cursor: pointer;
    transition: all .2s; white-space: nowrap;
  }

  .btn-finish-early:hover { background: rgba(239,68,68,.12); }

  /* Question area */
  .quiz-body {
    flex: 1; padding: 2rem 1.5rem;
    max-width: 780px; margin: 0 auto; width: 100%;
  }

  .q-counter {
    font-family: 'JetBrains Mono', monospace;
    font-size: .78rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .1em;
    margin-bottom: .9rem;
  }

  .q-counter span { color: var(--accent); font-weight: 600; }

  .q-text {
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 500; line-height: 1.65;
    margin-bottom: 1.75rem;
    color: var(--text);
  }

  /* Answers */
  .answers { display: flex; flex-direction: column; gap: .6rem; }

  .ans-btn {
    display: flex; align-items: center; gap: .9rem;
    padding: .9rem 1.1rem;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); cursor: pointer;
    transition: all .18s; text-align: left;
    font-family: 'Sora', sans-serif; font-size: .92rem;
    color: var(--text); position: relative; overflow: hidden;
  }

  .ans-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,.04));
    opacity: 0; transition: opacity .2s;
  }

  .ans-btn:not(.locked):hover {
    border-color: var(--accent);
    transform: translateX(3px);
  }

  .ans-btn:not(.locked):hover::before { opacity: 1; }

  .ans-letter {
    width: 30px; height: 30px; border-radius: 50%;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: .8rem; font-weight: 600;
    color: var(--muted); flex-shrink: 0;
    transition: all .2s;
  }

  .ans-btn:not(.locked):hover .ans-letter {
    border-color: var(--accent); color: var(--accent);
  }

  /* States */
  .ans-btn.correct {
    background: rgba(16,185,129,.12);
    border-color: var(--success);
    transform: translateX(3px);
  }

  .ans-btn.correct .ans-letter {
    background: var(--success); border-color: var(--success);
    color: #fff;
  }

  .ans-btn.wrong {
    background: rgba(239,68,68,.1);
    border-color: var(--danger);
  }

  .ans-btn.wrong .ans-letter {
    background: var(--danger); border-color: var(--danger);
    color: #fff;
  }

  .ans-btn.reveal-correct {
    background: rgba(16,185,129,.07);
    border-color: rgba(16,185,129,.4);
  }

  .ans-btn.reveal-correct .ans-letter {
    border-color: var(--success); color: var(--success);
  }

  .ans-btn.locked { cursor: default; }

  .feedback-icon {
    margin-left: auto; font-size: 1.1rem; flex-shrink: 0;
  }

  /* Feedback bar */
  .feedback-bar {
    margin-top: 1.2rem; padding: .75rem 1rem;
    border-radius: var(--radius); font-size: .88rem;
    font-weight: 500; display: none; align-items: center; gap: .6rem;
  }

  .feedback-bar.correct {
    display: flex;
    background: rgba(16,185,129,.12);
    border: 1px solid rgba(16,185,129,.3);
    color: #4ade80;
  }

  .feedback-bar.wrong {
    display: flex;
    background: rgba(239,68,68,.1);
    border: 1px solid rgba(239,68,68,.25);
    color: #f87171;
  }

  /* Navigation */
  .quiz-nav {
    position: sticky; bottom: 0;
    background: rgba(8,12,20,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
    max-width: 780px; margin: 0 auto; width: 100%;
  }

  /* hack: full-width sticky footer */
  .quiz-nav-wrap {
    position: sticky; bottom: 0;
    background: rgba(8,12,20,.92);
    backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    z-index: 10;
  }

  .quiz-nav-inner {
    max-width: 780px; margin: 0 auto;
    padding: 1rem 1.5rem;
    display: flex; justify-content: space-between; align-items: center;
  }

  .btn-nav {
    display: flex; align-items: center; gap: .5rem;
    padding: .6rem 1.2rem; border-radius: 999px;
    background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: 'Sora', sans-serif;
    font-size: .88rem; cursor: pointer; transition: all .2s;
  }

  .btn-nav:hover:not(:disabled) {
    border-color: var(--accent); color: var(--accent);
    box-shadow: 0 0 12px rgba(0,212,255,.15);
  }

  .btn-nav:disabled { opacity: .3; cursor: not-allowed; }

  .btn-nav-primary {
    padding: .6rem 1.5rem; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), #0ea5e9);
    border: none; color: #000; font-family: 'Sora', sans-serif;
    font-size: .88rem; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }

  .btn-nav-primary:hover { transform: scale(1.03); }

  .q-dots {
    display: flex; gap: .3rem; flex-wrap: wrap; max-width: 200px;
    justify-content: center;
  }

  .q-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--border); transition: all .3s;
  }

  .q-dot.current { background: var(--accent); transform: scale(1.4); }
  .q-dot.answered-ok { background: var(--success); }
  .q-dot.answered-fail { background: var(--danger); }
  .q-dot.skipped { background: var(--muted); }

  /* ── RESULTS SCREEN ── */
  #results-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; padding: 2rem;
    animation: fadeIn .5s ease;
  }

  .result-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: calc(var(--radius) * 1.5);
    padding: 2.5rem; width: 100%; max-width: 540px;
    box-shadow: 0 24px 80px rgba(0,0,0,.5);
    text-align: center;
  }

  .score-ring {
    position: relative; width: 140px; height: 140px;
    margin: 0 auto 1.5rem;
  }

  .score-ring svg { transform: rotate(-90deg); }

  .score-ring-bg {
    fill: none; stroke: var(--border); stroke-width: 8;
  }

  .score-ring-fill {
    fill: none; stroke-width: 8; stroke-linecap: round;
    transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
  }

  .score-ring-text {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  .score-pct {
    font-size: 2rem; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
  }

  .score-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; }

  .result-title {
    font-size: 1.5rem; font-weight: 700; margin-bottom: .5rem;
  }

  .result-subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 2rem; }

  .stats-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: .75rem; margin-bottom: 2rem;
  }

  .stat-box {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1rem;
  }

  .stat-box-val {
    font-size: 1.6rem; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: .15rem;
  }

  .stat-box-val.green { color: var(--success); }
  .stat-box-val.red   { color: var(--danger); }
  .stat-box-val.blue  { color: var(--accent); }
  .stat-box-val.purple{ color: #a78bfa; }

  .stat-box-label {
    font-size: .75rem; color: var(--muted);
    text-transform: uppercase; letter-spacing: .06em;
  }

  .btn-restart {
    width: 100%; padding: .85rem;
    background: linear-gradient(135deg, var(--accent2), #a78bfa);
    border: none; border-radius: var(--radius);
    color: #fff; font-family: 'Sora', sans-serif;
    font-size: .95rem; font-weight: 700; cursor: pointer;
    transition: all .25s; margin-bottom: .75rem;
  }

  .btn-restart:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(124,58,237,.35);
  }

  .btn-secondary {
    width: 100%; padding: .75rem;
    background: transparent; border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--muted); font-family: 'Sora', sans-serif;
    font-size: .9rem; cursor: pointer; transition: all .2s;
  }

  .btn-secondary:hover {
    border-color: var(--text); color: var(--text);
  }

  /* ── REVIEW SCREEN ── */
  #review-screen {
    display: none; flex-direction: column;
    min-height: 100vh; padding: 1.5rem;
    animation: fadeIn .4s ease;
  }

  .review-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }

  .review-header h2 { font-size: 1.4rem; font-weight: 700; }

  .review-list { display: flex; flex-direction: column; gap: 1rem; max-width: 780px; margin: 0 auto; width: 100%; }

  .review-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 1.2rem;
  }

  .review-item.ok { border-left: 3px solid var(--success); }
  .review-item.fail { border-left: 3px solid var(--danger); }
  .review-item.skip { border-left: 3px solid var(--muted); }

  .review-q { font-size: .92rem; margin-bottom: .75rem; line-height: 1.5; }
  .review-a { font-size: .82rem; display: flex; align-items: flex-start; gap: .4rem; }
  .review-a.your { color: var(--danger); margin-bottom: .3rem; }
  .review-a.correct { color: var(--success); }

  /* Utility */
  @keyframes fadeIn { from { opacity:0; transform: translateY(12px); } to { opacity:1; transform: translateY(0); } }

  @keyframes popIn {
    0% { transform: scale(.85); opacity:0; }
    70% { transform: scale(1.04); }
    100% { transform: scale(1); opacity:1; }
  }

  .pop { animation: popIn .3s ease forwards; }

  .hidden { display: none !important; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">

  <!-- ═══════════════ SETUP ═══════════════ -->
  <div id="setup-screen">
    <div class="logo">🕌</div>
    <h1>Религиоведение</h1>
    <p class="subtitle">Тест-тренажёр</p>

    <div class="setup-card">
      <p class="field-label">Количество вопросов</p>
      <div class="pill-group" id="preset-pills">
        <button class="pill" onclick="selectPreset(10)">10</button>
        <button class="pill" onclick="selectPreset(20)">20</button>
        <button class="pill active" onclick="selectPreset(30)">30</button>
        <button class="pill" onclick="selectPreset(50)">50</button>
        <button class="pill" onclick="selectPreset(100)">100</button>
        <button class="pill" onclick="selectPreset(0)">Все</button>
      </div>

      <p class="field-label">Или введи своё число</p>
      <div class="custom-row">
        <input type="number" id="custom-count" placeholder="Например: 40" min="1">
      </div>

      <button class="btn-primary" onclick="startQuiz()">▶&nbsp; Начать тест</button>
      <p class="total-badge">Всего в базе: <span id="total-q">0</span> вопросов</p>
    </div>
  </div>

  <!-- ═══════════════ QUIZ ═══════════════ -->
  <div id="quiz-screen" style="display:none; flex-direction:column;">

    <div class="quiz-header">
      <div class="prog-wrap">
        <div class="prog-meta">
          <span id="hdr-q-pos">Вопрос 1 из 30</span>
          <span id="hdr-score-live">✓ 0</span>
        </div>
        <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
      </div>
      <div class="timer-display">
        <div class="timer-dot" id="timer-dot"></div>
        <span id="timer-val">00:00</span>
      </div>
      <button class="btn-finish-early" onclick="finishEarly()">Завершить</button>
    </div>

    <div class="quiz-body">
      <div class="q-counter">Вопрос <span id="q-idx">1</span> / <span id="q-total">30</span></div>
      <div class="q-text" id="q-text"></div>
      <div class="answers" id="answers-wrap"></div>
      <div class="feedback-bar" id="feedback-bar">
        <span id="feedback-icon"></span>
        <span id="feedback-text"></span>
      </div>
    </div>

    <div class="quiz-nav-wrap">
      <div class="quiz-nav-inner">
        <button class="btn-nav" id="btn-prev" onclick="navigate(-1)">← Назад</button>
        <div class="q-dots" id="q-dots"></div>
        <button class="btn-nav" id="btn-next" onclick="navigate(1)">Далее →</button>
      </div>
    </div>
  </div>

  <!-- ═══════════════ RESULTS ═══════════════ -->
  <div id="results-screen" style="display:none; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:2rem; animation: fadeIn .5s ease;">

    <div class="result-card">
      <div class="score-ring">
        <svg viewBox="0 0 120 120" width="140" height="140">
          <circle class="score-ring-bg" cx="60" cy="60" r="52"/>
          <circle class="score-ring-fill" id="score-circle" cx="60" cy="60" r="52"
            stroke-dasharray="326.7" stroke-dashoffset="326.7"/>
        </svg>
        <div class="score-ring-text">
          <div class="score-pct" id="res-pct">0%</div>
          <div class="score-label">результат</div>
        </div>
      </div>

      <div class="result-title" id="res-title">Отличный результат!</div>
      <div class="result-subtitle" id="res-sub">Тест завершён</div>

      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-box-val green" id="res-correct">0</div>
          <div class="stat-box-label">Правильно</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val red" id="res-wrong">0</div>
          <div class="stat-box-label">Неверно</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val blue" id="res-skipped">0</div>
          <div class="stat-box-label">Пропущено</div>
        </div>
        <div class="stat-box">
          <div class="stat-box-val purple" id="res-time">00:00</div>
          <div class="stat-box-label">Время</div>
        </div>
      </div>

      <button class="btn-restart" onclick="showReview()">📋 Разбор ошибок</button>
      <button class="btn-secondary" onclick="goSetup()">↩ Новый тест</button>
    </div>
  </div>

  <!-- ═══════════════ REVIEW ═══════════════ -->
  <div id="review-screen" style="display:none; flex-direction:column; min-height:100vh; padding:1.5rem; animation: fadeIn .4s ease;">
    <div class="review-header" style="max-width:780px; margin:0 auto; width:100%;">
      <h2>📋 Разбор ошибок</h2>
      <button class="btn-secondary" style="width:auto; padding:.5rem 1.2rem;" onclick="goSetup()">↩ Заново</button>
    </div>
    <div class="review-list" id="review-list"></div>
  </div>

</div>

<script>
// ══════════════════════════════════════════
//  QUESTIONS DATABASE
// ══════════════════════════════════════════

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let session = [];
let current = 0;
let answers  = {};   // index → chosen option index (or -1 = skipped)
let timerSec = 0;
let timerInterval = null;
let selectedCount = 30;

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
document.getElementById('total-q').textContent = QUESTIONS.length;

function selectPreset(n) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  selectedCount = n === 0 ? QUESTIONS.length : n;
  event.target.classList.add('active');
  document.getElementById('custom-count').value = '';
}

function startQuiz() {
  const custom = parseInt(document.getElementById('custom-count').value);
  let n = isNaN(custom) ? selectedCount : custom;
  n = Math.max(1, Math.min(n, QUESTIONS.length));

  // Shuffle & pick n questions
  const shuffled = [...QUESTIONS].sort(() => Math.random() - .5);
  session = shuffled.slice(0, n);
  current = 0;
  answers = {};
  timerSec = 0;

  document.getElementById('q-total').textContent = n;
  buildDots();
  renderQuestion();
  updateHeader();

  document.getElementById('setup-screen').style.display   = 'none';
  document.getElementById('quiz-screen').style.display    = 'flex';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('review-screen').style.display  = 'none';

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timerSec++;
    updateTimer();
  }, 1000);
}

// ══════════════════════════════════════════
//  RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion() {
  const q = session[current];
  const ans = answers[current];

  document.getElementById('q-idx').textContent = current + 1;
  document.getElementById('q-text').textContent = q.q;

  const wrap = document.getElementById('answers-wrap');
  wrap.innerHTML = '';

  const letters = ['A', 'B', 'C', 'D'];
  q.ans.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';

    const letter = document.createElement('span');
    letter.className = 'ans-letter';
    letter.textContent = letters[i];

    const text = document.createElement('span');
    text.textContent = opt;

    btn.appendChild(letter);
    btn.appendChild(text);

    if (ans !== undefined) {
      // already answered
      btn.classList.add('locked');
      if (i === q.c) {
        btn.classList.add(ans === i ? 'correct' : 'reveal-correct');
        const icon = document.createElement('span');
        icon.className = 'feedback-icon';
        icon.textContent = '✓';
        btn.appendChild(icon);
      } else if (i === ans && ans !== q.c) {
        btn.classList.add('wrong');
        const icon = document.createElement('span');
        icon.className = 'feedback-icon';
        icon.textContent = '✗';
        btn.appendChild(icon);
      }
    } else {
      btn.onclick = () => selectAnswer(i);
    }

    btn.style.animationDelay = (i * 0.05) + 's';
    btn.classList.add('pop');
    wrap.appendChild(btn);
  });

  // Feedback bar
  const fb = document.getElementById('feedback-bar');
  if (ans !== undefined) {
    const correct = ans === q.c;
    fb.className = 'feedback-bar ' + (correct ? 'correct' : 'wrong');
    document.getElementById('feedback-icon').textContent = correct ? '✅' : '❌';
    document.getElementById('feedback-text').textContent = correct
      ? 'Верно!'
      : `Правильный ответ: ${letters[q.c]}. ${q.ans[q.c]}`;
  } else {
    fb.className = 'feedback-bar';
  }

  updateDots();
  updateNav();
  updateHeader();
}

function selectAnswer(i) {
  answers[current] = i;
  renderQuestion();
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function navigate(dir) {
  const next = current + dir;
  if (next < 0 || next >= session.length) return;
  if (dir === 1 && answers[current] === undefined) {
    // mark as skipped
    answers[current] = -1;
  }
  current = next;
  renderQuestion();
}

function updateNav() {
  document.getElementById('btn-prev').disabled = current === 0;
  const isLast = current === session.length - 1;
  const nxt = document.getElementById('btn-next');
  nxt.textContent = isLast ? 'Завершить →' : 'Далее →';
  nxt.onclick = isLast ? showResults : () => navigate(1);
}

// ══════════════════════════════════════════
//  DOTS
// ══════════════════════════════════════════
function buildDots() {
  const wrap = document.getElementById('q-dots');
  wrap.innerHTML = '';
  const max = Math.min(session.length, 20);
  for (let i = 0; i < max; i++) {
    const d = document.createElement('div');
    d.className = 'q-dot';
    d.id = 'dot-' + i;
    wrap.appendChild(d);
  }
}

function updateDots() {
  const max = Math.min(session.length, 20);
  for (let i = 0; i < max; i++) {
    const d = document.getElementById('dot-' + i);
    if (!d) continue;
    const a = answers[i];
    d.className = 'q-dot' +
      (i === current ? ' current' :
       a === undefined ? '' :
       a === -1 ? ' skipped' :
       a === session[i].c ? ' answered-ok' : ' answered-fail');
  }
}

// ══════════════════════════════════════════
//  HEADER
// ══════════════════════════════════════════
function updateHeader() {
  document.getElementById('hdr-q-pos').textContent =
    `Вопрос ${current + 1} из ${session.length}`;

  const answered = Object.values(answers).filter(v => v !== undefined && v !== -1).length;
  const correct  = Object.keys(answers).filter(k => answers[k] === session[k]?.c).length;
  document.getElementById('hdr-score-live').textContent = `✓ ${correct}`;

  const pct = ((current + 1) / session.length) * 100;
  document.getElementById('prog-fill').style.width = pct + '%';
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function updateTimer() {
  const m = String(Math.floor(timerSec / 60)).padStart(2, '0');
  const s = String(timerSec % 60).padStart(2, '0');
  document.getElementById('timer-val').textContent = `${m}:${s}`;
  const dot = document.getElementById('timer-dot');
  dot.className = 'timer-dot' +
    (timerSec > 3600 ? ' danger' : timerSec > 1800 ? ' warning' : '');
}

function finishEarly() {
  // mark remaining as skipped
  for (let i = 0; i < session.length; i++) {
    if (answers[i] === undefined) answers[i] = -1;
  }
  showResults();
}

// ══════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════
function showResults() {
  clearInterval(timerInterval);

  const total   = session.length;
  const correct = Object.keys(answers).filter(k => answers[k] === session[k]?.c).length;
  const wrong   = Object.keys(answers).filter(k => answers[k] !== undefined && answers[k] !== -1 && answers[k] !== session[k]?.c).length;
  const skipped = Object.keys(answers).filter(k => answers[k] === -1).length;
  const pct     = Math.round((correct / total) * 100);

  document.getElementById('res-pct').textContent     = pct + '%';
  document.getElementById('res-correct').textContent  = correct;
  document.getElementById('res-wrong').textContent    = wrong;
  document.getElementById('res-skipped').textContent  = total - correct - wrong;
  const m = String(Math.floor(timerSec / 60)).padStart(2,'0');
  const s = String(timerSec % 60).padStart(2,'0');
  document.getElementById('res-time').textContent     = `${m}:${s}`;

  let title = pct >= 90 ? '🏆 Отлично!' : pct >= 70 ? '👍 Хороший результат' : pct >= 50 ? '📚 Неплохо, но есть куда расти' : '💪 Нужно повторить материал';
  document.getElementById('res-title').textContent = title;
  document.getElementById('res-sub').textContent = `${correct} из ${total} вопросов`;

  // Animate ring
  const circ = 2 * Math.PI * 52;
  const offset = circ * (1 - pct / 100);
  const ring = document.getElementById('score-circle');
  ring.style.stroke = pct >= 70 ? '#10b981' : pct >= 50 ? '#f59e0b' : '#ef4444';
  setTimeout(() => { ring.style.strokeDashoffset = offset; }, 100);

  document.getElementById('quiz-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'flex';
  document.getElementById('review-screen').style.display  = 'none';
}

// ══════════════════════════════════════════
//  REVIEW
// ══════════════════════════════════════════
function showReview() {
  const list = document.getElementById('review-list');
  list.innerHTML = '';
  const letters = ['A','B','C','D'];

  session.forEach((q, i) => {
    const userAns = answers[i];
    const isCorrect = userAns === q.c;
    const isSkipped = userAns === -1 || userAns === undefined;

    if (isCorrect) return; // show only wrong + skipped

    const item = document.createElement('div');
    item.className = 'review-item ' + (isSkipped ? 'skip' : 'fail');

    const qText = document.createElement('div');
    qText.className = 'review-q';
    qText.textContent = `${i+1}. ${q.q}`;
    item.appendChild(qText);

    if (!isSkipped) {
      const yourA = document.createElement('div');
      yourA.className = 'review-a your';
      yourA.innerHTML = `✗ Ваш ответ: ${letters[userAns]}. ${q.ans[userAns]}`;
      item.appendChild(yourA);
    }

    const corrA = document.createElement('div');
    corrA.className = 'review-a correct';
    corrA.innerHTML = `✓ Верный ответ: ${letters[q.c]}. ${q.ans[q.c]}`;
    item.appendChild(corrA);

    list.appendChild(item);
  });

  if (list.children.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:3rem;color:var(--success);font-size:1.2rem;">🎉 Нет ошибок! Блестящий результат!</div>';
  }

  document.getElementById('quiz-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('review-screen').style.display  = 'flex';
}

function goSetup() {
  clearInterval(timerInterval);
  document.getElementById('setup-screen').style.display   = 'flex';
  document.getElementById('quiz-screen').style.display    = 'none';
  document.getElementById('results-screen').style.display = 'none';
  document.getElementById('review-screen').style.display  = 'none';
}
</script>
</body>
